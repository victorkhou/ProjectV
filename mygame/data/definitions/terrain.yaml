    movement_modifier: -2    # treacherous slick footing
    defense_modifier: -2     # totally exposed on the ice

  - terrain_type: Pine_Forest
    map_symbol: "&&"
    resource_type: Wood
    passable: true
    planet: tundra
    vision_modifier: -2      # dense evergreens
    movement_modifier: -1    # snow-laden underbrush
    defense_modifier: 3      # thick trunks: strong cover

  - terrain_type: Ice_Cave
