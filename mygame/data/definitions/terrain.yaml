    defense_modifier: 1      # ash haze veils targets

  - terrain_type: Lava_Flow
    map_symbol: "!!"
    resource_type: Magmite
    passable: true
    planet: inferno
    vision_modifier: -1      # heat shimmer distorts sight
    movement_modifier: -2    # picking a path over molten rock
