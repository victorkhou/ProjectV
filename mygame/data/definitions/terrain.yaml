# Legacy planet list for backward compatibility with DataRegistry._populate_terrain
planets:
  - name: Terra
    planet_type: earth
    terrain_types:
      - Plains
      - Forest
      - Dirt
      - Rock
      - Mountain
      - River
      - Sand
      - Snow

  - name: Forge
    planet_type: industrial
    terrain_types:
      - Power_Grid
      - Scrapyard
      - Circuit_Field
      - Factory_Floor
      - Ruins
      - Toxic_Waste
      - Pipeline
      - Warehouse

  - name: Tundra
    planet_type: frozen
    terrain_types:
      - Snowfield
      - Frozen_Lake
      - Pine_Forest
      - Ice_Cave
      - Permafrost
      - Glacier
      - Hot_Spring
      - Tundra_Moss

  - name: Inferno
    planet_type: volcanic
    terrain_types:
      - Ash_Wastes
      - Lava_Flow
      - Obsidian_Plain
      - Magma_Vent
      - Scorched_Rock
      - Sulfur_Pit
      - Ember_Field
      - Basalt_Ridge

  - name: Elysium
    planet_type: paradise
    terrain_types:
      - Aether_Spring
      - Forest
      - Rock
      - Mountain
      - Ley_Nexus
      - Arcane_Relay
      - Cloud_Meadow
      - Shimmer_Lake

  - name: Citadel
    planet_type: fortress
    terrain_types:
      - Corridor
      - Vault_Room
      - Armory_Ruin
      - Control_Room
      - Open_Chamber
      - Blast_Door
      - Generator_Room
      - Barracks_Ruin

  - name: Space
    planet_type: space
    terrain_types:
      - Void
      - Nebula
      - Asteroid
      - Debris
      - Ice_Field
      - Wormhole
      - Radiation_Zone
      - Derelict_Ship
