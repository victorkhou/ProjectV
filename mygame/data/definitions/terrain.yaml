    passable: true
    planet: terra
    vision_modifier: 0      # common — neutral buildable ground (~15% each)
    movement_modifier: 0
    defense_modifier: 0

  - terrain_type: Mountain
    map_symbol: "/\\"
    resource_type: Iron
    passable: true
    planet: terra
    vision_modifier: 2      # sight-hill — see far, move slow
    movement_modifier: -2
    defense_modifier: 1
    latitude_bias: 1.5      # mountains cluster toward the poles (N/S edges)

  - terrain_type: Sand
    map_symbol: "::"
    resource_type: null
    passable: true
    planet: terra
    vision_modifier: -2      # cover-fast — concealed, quick footing
    movement_modifier: 1
    defense_modifier: 1
    latitude_bias: -1.5     # sand (desert) concentrates toward the equator

  - terrain_type: Forest
    map_symbol: "&&"
    resource_type: Wood
    passable: true
    planet: terra
    vision_modifier: -2      # fortress — best cover, poor sightlines
    movement_modifier: -1
    defense_modifier: 3

  - terrain_type: Snow
    map_symbol: "**"
    resource_type: null
    passable: true
    planet: terra
    vision_modifier: 1      # open — exposed but mobile
    movement_modifier: 1
    defense_modifier: -1
    latitude_bias: 2.0      # snow packs hard toward the poles (N/S edges)
    latitude_min: 0.3       # never in the central 30% of rows (no equator snow)

  - terrain_type: River
    map_symbol: "=="
    resource_type: null
    passable: true
    planet: terra
    buildable: false
    vision_modifier: -2      # treacherous — all-negative, NOT buildable (future features)
