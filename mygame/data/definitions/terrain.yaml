# Terrain and planet definitions for RTS Combat Overworld
# Unified terrain template (terrain-strategy rebalance): every planet has
# 3 COMMON buildable tiles (0/0/0, ~40-50% of the map) that supply the
# Wood/Stone/Iron every building costs, plus one tile of each archetype:
#   SIGHT (V+ M-), COVER (V- M+), FORTRESS (high D, low V), OPEN (V+ D-),
#   and a TREACHEROUS tile (all-negative, buildable: false) reserved for
# future special features. Planet-unique resources (Biomass/Cryogen/
# Magmite/Aether/Nexium) sit on each planet's fortress/treacherous tiles as
# the per-planet differentiator. Base-building philosophy is identical
# everywhere; the payoff tiles and hazards differ by biome.
#
# Modifier fields: vision_modifier (int tiles), movement_modifier (ticks,
# + = faster), defense_modifier (DR). buildable (default true) gates
# construction. resource_type null = cosmetic/hazard tile.

terrain:
  # ── Terra (earth) — Rank 1+ ──
  - terrain_type: Plains
    map_symbol: ".."
    resource_type: null
    passable: true
    planet: terra
    vision_modifier: 0      # common — neutral buildable ground (~15% each)
    movement_modifier: 0
    defense_modifier: 0

  - terrain_type: Dirt
    map_symbol: "~~"
    resource_type: Biomass
    passable: true
    planet: terra
    vision_modifier: 0      # common — neutral buildable ground (~15% each)
    movement_modifier: 0
    defense_modifier: 0

  - terrain_type: Rock
