  - terrain_type: Obsidian_Plain
    map_symbol: "##"
    resource_type: Stone
    passable: true
    planet: inferno
    vision_modifier: 1       # flat glassy expanse
    movement_modifier: 1     # smooth hard surface
    defense_modifier: -1     # open ground

  - terrain_type: Magma_Vent
    map_symbol: "^^"
    resource_type: Energy
    passable: true
    planet: inferno
    vision_modifier: -2      # smoke and glare
    movement_modifier: -1    # dodging vent bursts
