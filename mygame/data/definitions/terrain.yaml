  - terrain_type: Scorched_Rock
    map_symbol: ".."
    resource_type: Iron
    passable: true
    planet: inferno
    movement_modifier: -1    # cracked uneven rock
    defense_modifier: 2      # heat-split boulders give cover

  - terrain_type: Sulfur_Pit
    map_symbol: "%%"
    resource_type: Magmite
    passable: true
    planet: inferno
    vision_modifier: -2      # acrid yellow fumes
    movement_modifier: -2    # sinking crusted ground
    defense_modifier: -1     # choking exposure

  - terrain_type: Ember_Field
    map_symbol: "**"
    resource_type: null
    passable: true
    planet: inferno
    vision_modifier: -1      # glowing haze
    movement_modifier: -1    # hopping between hot spots

  - terrain_type: Basalt_Ridge
    map_symbol: "/\\"
    resource_type: null
    passable: true
    planet: inferno
    vision_modifier: 2       # elevated vantage
    movement_modifier: -2    # jagged columns to scale
    defense_modifier: 2      # rock columns break lines of fire

  # ── Citadel (fortress) — Rank 11+ ──────────────────────────
  # Nexium (only source), plus Iron, Circuits, Energy
  - terrain_type: Corridor
    map_symbol: ".."
    resource_type: null
    passable: true
    planet: citadel
    vision_modifier: -1      # walls limit sightlines
    movement_modifier: 1     # clear straight run
    defense_modifier: 1      # doorframes and corners

  - terrain_type: Vault_Room
    map_symbol: "[]"
    resource_type: Nexium
    passable: true
    planet: citadel
    vision_modifier: -2      # sealed chamber
    movement_modifier: -1    # heavy vault fittings
    defense_modifier: 4      # reinforced walls: fortress cover

  - terrain_type: Armory_Ruin
    map_symbol: "{}"
    resource_type: Iron
    passable: true
    planet: citadel
    vision_modifier: -1      # collapsed racks block view
