# Terrain and planet definitions for RTS Combat Overworld
# Phase 1: 48 terrain types (8 per planet) with resource associations
# Resources: Wood, Stone, Iron, Energy, Circuits, Nexium
# ~40% of tiles produce resources; the rest are cosmetic/gameplay terrain.

terrain:
  # ── Terra (earth) — Rank 1+ ────────────────────────────────
  # Basics: Wood, Stone, Iron
  - terrain_type: Plains
    map_symbol: ".."
    resource_type: Biomass
    passable: true
    planet: terra
    vision_modifier: 1       # open grassland: long sightlines
    movement_modifier: 1     # easy footing: -1 tick of in-combat lag
    defense_modifier: -1     # exposed: nowhere to hide

  - terrain_type: Forest
    map_symbol: "&&"
    resource_type: Wood
    passable: true
    planet: terra
    vision_modifier: -2      # dense canopy narrows sightlines
    movement_modifier: -1    # slog: +1 tick of in-combat lag
    defense_modifier: 3      # cover: +3 DR

  - terrain_type: Dirt
    map_symbol: "~~"
    resource_type: Biomass
    passable: true
    planet: terra
    vision_modifier: 0       # unremarkable ground: intentionally neutral
    movement_modifier: 0
    defense_modifier: 0

  - terrain_type: Rock
    map_symbol: "##"
    resource_type: Stone
    passable: true
    planet: terra
    movement_modifier: -1    # rough footing
    defense_modifier: 2      # boulders provide cover

  - terrain_type: Mountain
    map_symbol: "/\\"
    resource_type: Iron
    passable: true
    planet: terra
    vision_modifier: 2       # high ground: commanding view
    movement_modifier: -2    # steep climb
    defense_modifier: 2      # defensible slopes

  - terrain_type: River
    map_symbol: "=="
    resource_type: null
    passable: true
    planet: terra
    movement_modifier: -2    # wading slows movement
    defense_modifier: -1     # exposed mid-crossing

  - terrain_type: Sand
    map_symbol: "::"
    resource_type: null
    passable: true
    planet: terra
    vision_modifier: 1       # open dunes
    movement_modifier: -1    # shifting sand drags feet
    defense_modifier: -1     # no cover

  - terrain_type: Snow
    map_symbol: "**"
    resource_type: null
    passable: true
    planet: terra
    vision_modifier: 1       # white expanse: easy spotting
    movement_modifier: -1    # deep drifts

  # ── Forge (industrial) — Rank 5+ ───────────────────────────
  # Introduces Energy + Circuits for mid-game tech
  - terrain_type: Power_Grid
    map_symbol: "++"
    resource_type: Energy
    passable: true
    planet: forge
    vision_modifier: -1      # towers and cabling clutter sightlines
    defense_modifier: 1      # pylons offer partial cover

  - terrain_type: Scrapyard
    map_symbol: "%%"
    resource_type: Iron
    passable: true
    planet: forge
    vision_modifier: -2      # junk heaps block sightlines
    movement_modifier: -1    # debris underfoot
    defense_modifier: 3      # abundant hard cover

  - terrain_type: Circuit_Field
    map_symbol: "::"
    resource_type: Circuits
    passable: true
    planet: forge
    vision_modifier: 1       # low flat arrays: clear lines of sight
    defense_modifier: -1     # nothing to hide behind

  - terrain_type: Factory_Floor
    map_symbol: "=="
    resource_type: null
    passable: true
    planet: forge
    movement_modifier: 1     # smooth open floor: fast footing
    defense_modifier: -1     # wide open interior

  - terrain_type: Ruins
    map_symbol: ";;"
    resource_type: null
    passable: true
    planet: forge
    vision_modifier: -1      # broken walls interrupt sightlines
    movement_modifier: -1    # rubble underfoot
    defense_modifier: 3      # walls make strong cover

  - terrain_type: Toxic_Waste
    map_symbol: "!!"
    resource_type: null
    passable: true
    planet: forge
    vision_modifier: -1      # chemical haze
    movement_modifier: -2    # careful steps through sludge
    defense_modifier: -1     # corrosive exposure

  - terrain_type: Pipeline
    map_symbol: "--"
    resource_type: null
    passable: true
    planet: forge
    movement_modifier: 1     # walkways speed travel
    defense_modifier: 1      # pipes give partial cover

  - terrain_type: Warehouse
    map_symbol: "[]"
    resource_type: null
    passable: true
    planet: forge
    vision_modifier: -2      # stacked crates block view
    defense_modifier: 2      # plenty of cover between shelves

  # ── Tundra (frozen) — Rank 7+ ──────────────────────────────
  # Alternate sources of Wood, Stone, Iron
  - terrain_type: Snowfield
    map_symbol: "**"
    resource_type: null
    passable: true
    planet: tundra
    vision_modifier: 2       # flat white expanse: spot anything
