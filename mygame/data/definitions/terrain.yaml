    defense_modifier: 4      # cave walls: excellent cover

  - terrain_type: Permafrost
    map_symbol: "##"
    resource_type: Stone
    passable: true
    planet: tundra
    movement_modifier: -1    # frozen rutted ground
    defense_modifier: 1      # frost heaves give slight cover

  - terrain_type: Glacier
    map_symbol: "/\\"
    resource_type: null
    passable: true
    planet: tundra
    vision_modifier: 2       # elevated ice ridge: long views
    movement_modifier: -2    # crevasses and sheer ice
    defense_modifier: 1      # ice ridges break lines of fire

  - terrain_type: Hot_Spring
    map_symbol: "@@"
    resource_type: Cryogen
    passable: true
    planet: tundra
    vision_modifier: -2      # steam clouds obscure vision
    movement_modifier: -1    # scalding pools to skirt
    defense_modifier: 1      # mist makes targets hard to hit

  - terrain_type: Tundra_Moss
    map_symbol: ",,"
    resource_type: null
    passable: true
    planet: tundra
    vision_modifier: 1       # low flat ground cover
    movement_modifier: 1     # springy moss: easy going

  # ── Inferno (volcanic) — Rank 9+ ───────────────────────────
  # Alternate Stone, Iron + Energy
  - terrain_type: Ash_Wastes
    map_symbol: "~~"
    resource_type: null
    passable: true
    planet: inferno
    vision_modifier: -2      # drifting ash chokes visibility
