    defense_modifier: -1     # unstable footing for defense

  - terrain_type: Radiation_Zone
    map_symbol: "!!"
    resource_type: null
    passable: true
    planet: space
    vision_modifier: -1      # sensor static
    movement_modifier: -1    # shielded, cautious transit
    defense_modifier: -1     # radiation stresses defenses

  - terrain_type: Derelict_Ship
    map_symbol: "[]"
    resource_type: null
    passable: true
