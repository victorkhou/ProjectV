    movement_modifier: -1    # dodging fragments
    defense_modifier: 2      # wreckage makes decent cover

  - terrain_type: Ice_Field
    map_symbol: "><"
    resource_type: null
    passable: true
    planet: space
    vision_modifier: -1      # glinting ice scatters light
    defense_modifier: 1      # ice chunks deflect some fire

  - terrain_type: Wormhole
    map_symbol: "@@"
    resource_type: null
    passable: true
    planet: space
    vision_modifier: -2      # spacetime distortion warps sight
