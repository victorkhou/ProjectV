# Player class definitions (state 3.2 + Phase 5 substrate).
#
# Each class is a SIDEGRADE: a strength paired with a weakness, never a raw
# power tier (binding principle: skill > progression).
#
# ⚠ WIRING STATUS: only the `damage_bonus` axis is currently consumed by combat
# (CombatEngine._get_class_modifier, folded into _get_attacker_bonus). The other
# axes (max_hp, accuracy, move_speed, range, sight_range, agent_cap) each need
# their own consumer wiring at their respective read sites — until then they would
# be DEAD DATA. To avoid shipping stats that look functional but aren't, each
# class currently carries ONLY its damage_bonus modifier; the intended full
# sidegrade (the paired strength+weakness) is recorded in the description and will
# be filled in as each axis gets a consumer. See steering doc §2d / Phase 5.
#
# key: persists on db.player_class; name/description drive the selection menu.
#
# terrain_affinities (terrain-strategy feature) ARE wired: the
# TerrainModifierSystem folds them into vision, in-combat movement lag, and
# damage reduction for the matching terrain. Each entry is
# {terrain_type, kind: vision|movement|defense, adjustment}; terrain types are
# cross-validated against terrain.yaml at load, and any class with a positive
# affinity must carry an offsetting negative affinity or negative stat_modifier
# named in its description (sidegrade rule, fail-fast at load).

classes:
  - key: vanguard
    name: Vanguard
    description: >-
      Front-line assault specialist. Leads the breach and holds the line.
      Charges hard across open Plains (faster in-combat movement) but heavy
      kit snags under the Forest canopy, slowing movement there. Intended
      sidegrade: +HP, faster move; -accuracy, -range (pending wiring).
    stat_modifiers: {}
    terrain_affinities:
      - {terrain_type: Plains, kind: movement, adjustment: 1}
      - {terrain_type: Forest, kind: movement, adjustment: -1}

  - key: engineer
    name: Engineer
    description: >-
      Builder and fortifier. Keeps the base running and the walls standing.
      Digs in well on Rock and among Ruins (+1 defense each) but is weaker in
      direct combat (-5 damage) — the paired sight/build strengths are pending
      their consumer wiring.
    stat_modifiers:
      damage_bonus: -5
    terrain_affinities:
      - {terrain_type: Rock, kind: defense, adjustment: 1}
      - {terrain_type: Ruins, kind: defense, adjustment: 1}

  - key: ranger
    name: Ranger
    description: >-
      Scout and marksman. At home under the canopy — sees farther and moves
      faster through Forest — but thin-skinned in the open: reduced defense
      on Plains. Intended sidegrade: +range, +accuracy; -HP (pending wiring).
    stat_modifiers: {}
    terrain_affinities:
      - {terrain_type: Forest, kind: movement, adjustment: 1}
      - {terrain_type: Forest, kind: vision, adjustment: 2}
      - {terrain_type: Plains, kind: defense, adjustment: -1}

  - key: commander
    name: Commander
    description: >-
      Tactician who leads agents and coordinates the war effort.
      +2 damage aura strength; the paired +agent-cap / -HP fragility is pending
      agent_cap/max_hp wiring.
    stat_modifiers:
      damage_bonus: 2
