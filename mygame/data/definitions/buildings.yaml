# Building definitions for RTS Combat Overworld
# Phase 1: 12 building types with construction timers, level requirements,
# agent support, and storage capacities
#
# rank_requirement is now a LEVEL requirement (1-60).
# Rank is cosmetic — derived from level (every 5 levels = 1 rank).
#
# Build times are for initial L1 construction.
# Upgrades use exponential scaling: time = build_time × 3^(level-1),
# cost = base_cost × 2^(level-1). This is where agents earn their keep.

- name: Headquarters
  abbreviation: HQ
  cost:
    Wood: 10
    Stone: 10
    Iron: 10
  build_time_seconds: 30
  max_level: 5
  rank_requirement: 1
  max_health: 500
  requires_hq: false
  required_terrain: null
  category: headquarters
  produces: null
  requires_agent: false
  storage_capacity: 0
  unlocks:
    - EX
    - AC
    - WL
    - LB
    - VT
  map_symbol: HQ

