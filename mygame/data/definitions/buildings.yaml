# Shield Generator — projects a regenerating damage-absorbing shield onto the
# owner's buildings within a level-scaled radius (L1 = 2-tile/5x5 radius, 25% of
# each covered building's HP; +1 radius and +25% shield per level). Shield
# absorbs damage before HP and regenerates (1%/5 ticks). Max 4 per player per
# planet (world.constants.MAX_SHIELD_GENERATORS_PER_PLANET). Tuning of the
# radius/fraction/regen lives in balance.yaml (shield_*).
- name: Shield Generator
  abbreviation: SG
  cost:
    Wood: 30
    Stone: 20
    Iron: 40
  build_time_seconds: 35
  max_level: 5
  rank_requirement: 15
  max_health: 200
  requires_hq: true
  required_terrain: null
  category: defense
  produces: null
  requires_agent: false
  storage_capacity: 0
  capabilities:
    - shield_generator
    - upgradable
  map_symbol: SG

# Respawn Beacon — your respawn point on this planet, and the safety net for
# death loss. On death you lose ALL carried gear/supplies/resources; this
# building recovers a building-level-scaled fraction (55% at L1 → 95% at L5) into
# its stash for collection when you respawn here. Early + cheap (Terra-craftable
# basics) so a new base can afford protection right away; one per planet.
- name: Respawn Beacon
  abbreviation: RB
  cost:
    Wood: 20
    Stone: 15
    Iron: 10
  build_time_seconds: 25
  max_level: 5
  rank_requirement: 2
  max_health: 200
  requires_hq: true
  required_terrain: null
  category: utility
  produces: null
  requires_agent: false
  storage_capacity: 0
  capabilities:
    - respawn_point
    - upgradable
  map_symbol: RB

# Cross-planet travel infrastructure. The player launches from a Launch Pad,
# consuming fuel, routing through Space (contested PvP corridor), and arriving
# at their Beacon/HQ on the destination planet. Upgradable: higher levels
# increase the manifest capacity for agents and cargo. See steering doc §7.
- name: Launch Pad
  abbreviation: LP
  cost:
    Wood: 30
    Stone: 25
    Iron: 20
