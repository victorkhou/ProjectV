# Building definitions for RTS Combat Overworld
# Early-game rebalance: rank_requirement is a LEVEL gate (1-100).
# Unlock cadence targets one new building every 1-3 minutes in the first
# half hour, then every 5-7 minutes (R2). Deed gates (unlock_deed +
# unlock_deed_count) layer atop level for world-facing unlocks (R9).
#
# Build times are for initial L1 construction.
# Upgrades use exponential scaling: time = build_time × 3^(level-1),
# cost = base_cost × 2^(level-1). This is where agents earn their keep.

- name: Headquarters
  abbreviation: HQ
  cost:
    Wood: 10
    Stone: 10
    Iron: 10
  build_time_seconds: 30
  max_level: 5
  rank_requirement: 1
  max_health: 500
  requires_hq: false
  required_terrain: null
  category: headquarters
  produces: null
  requires_agent: false
  storage_capacity: 200
  capabilities:
    - headquarters
    - storage
  map_symbol: HQ

