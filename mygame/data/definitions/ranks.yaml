# Rank definitions for RTS Combat Overworld
#
# Each rank defines a NAME and agent_cap. Rank membership is derived from the
# player's LEVEL via the widening RANK_BANDS table in world/constants.py
# (R14.5) — NOT from the xp_threshold values below.
#
# xp_threshold is LEGACY DISPLAY DATA ONLY (task 6.5): the live XP curve is
# the hybrid formula in world/progression.py, tuned via balance.yaml
# (xp_curve_*). These values are kept for schema stability and historical
# reference; no runtime system derives rank or level from them.
#
# Planet access is gated solely by the LEVEL rank_requirement in
# data/definitions/planets.yaml (enforced by can_access_planet in
# rank_system.py). The old per-rank planet_access lists have been removed
# (they were dead data — no runtime consumer ever read them).

- name: Recruit
  level: 1
  xp_threshold: 0
  agent_cap: 2

- name: Private
  level: 2
  xp_threshold: 200
  agent_cap: 3

- name: Corporal
  level: 3
