# Rank definitions for RTS Combat Overworld
# Phase 1: 12 ranks with strictly increasing XP thresholds
# Each rank defines agent_cap, planet_access, and unlocks
# Planet rank requirements: Terra=1, Forge=5, Tundra=7, Space=7, Inferno=9, Citadel=11

- name: Recruit
  level: 1
  xp_threshold: 0
  agent_cap: 2
  planet_access:
    - terra
  unlocks:
    - Extractor
    - Academy

- name: Private
  level: 2
  xp_threshold: 200
  agent_cap: 3
  planet_access:
    - terra
  unlocks: []

