# Planet coordinate space definitions for the Procedural Coordinate World system.
# Each entry defines a separate coordinate space with its own dimensions,
# terrain seed, terrain weights, and room persistence type.
# z_level provides a numeric shorthand for teleport (e.g. teleport 50,50,0)
# Phase 1: 6 planets with level-gated progression
#
# rank_requirement is now a LEVEL requirement (1-100).
# Final ladder (2026-07-21): Terra=1, Forge=21, Tundra=33, Inferno=46,
# Elysium=58, Citadel=70, Space=1 (off-ladder hub).
#
# z_level ordering follows the progression ladder: Terra=0, Forge=1, Tundra=2,
# Inferno=3, Elysium=4, Citadel=5, Space=6 (hub last). z_level is only a
# teleport shorthand; runtime planet identity is planet_key, and terrain is
# seed-derived, so renumbering z_level never regenerates maps or moves data.

planets:
  - planet_key: "terra"
    planet_type: "earth"
    z_level: 0
    width: 500
    height: 500
    terrain_seed: 42
    terrain_noise_cell_size: 8
    terrain_weights:
      Plains: 0.25
      Forest: 0.20
      Dirt: 0.15
      Rock: 0.15
      Mountain: 0.08
      River: 0.07
      Sand: 0.05
      Snow: 0.05
    persistence_type: "static"
    spawn_x: 250
    spawn_y: 250
    default_planet: true
    rank_requirement: 1
    yield_scale: 1.0   # baseline harvest yield (Phase 4 ascending yields)
    npc_scale: 1.0     # baseline NPC-base difficulty

  - planet_key: "forge"
    planet_type: "industrial"
    z_level: 1
    width: 400
    height: 400
    terrain_seed: 7
    terrain_noise_cell_size: 8
    terrain_weights:
      Power_Grid: 0.20
      Scrapyard: 0.15
      Circuit_Field: 0.18
      Factory_Floor: 0.12
      Ruins: 0.10
      Toxic_Waste: 0.08
      Pipeline: 0.10
      Warehouse: 0.07
    persistence_type: "static"
    spawn_x: 200
    spawn_y: 200
    rank_requirement: 21
    yield_scale: 1.2
    npc_scale: 1.3

  - planet_key: "tundra"
    planet_type: "frozen"
    z_level: 2
    width: 400
    height: 400
    terrain_seed: 13
    terrain_noise_cell_size: 8
    terrain_weights:
      Snowfield: 0.25
      Frozen_Lake: 0.10
      Pine_Forest: 0.15
      Ice_Cave: 0.08
      Permafrost: 0.18
      Glacier: 0.08
      Hot_Spring: 0.08
      Tundra_Moss: 0.08
    persistence_type: "static"
    spawn_x: 200
    spawn_y: 200
    rank_requirement: 33
    yield_scale: 1.4
    npc_scale: 1.6

  - planet_key: "inferno"
    planet_type: "volcanic"
    z_level: 3
    width: 300
    height: 300
    terrain_seed: 66
    terrain_noise_cell_size: 8
    terrain_weights:
      Ash_Wastes: 0.20
      Lava_Flow: 0.10
      Obsidian_Plain: 0.15
      Magma_Vent: 0.12
      Scorched_Rock: 0.18
      Sulfur_Pit: 0.08
      Ember_Field: 0.10
      Basalt_Ridge: 0.07
    persistence_type: "static"
    spawn_x: 150
    spawn_y: 150
    rank_requirement: 46
    yield_scale: 1.6
    npc_scale: 2.0

  - planet_key: "elysium"
    planet_type: "paradise"
    z_level: 4
    width: 400
    height: 400
    terrain_seed: 117
    terrain_noise_cell_size: 8
    # Elysium is an earth-like paradise: an Earth-terrain base (~60%) with the
    # arcane paradise tiles scattered as accents (~40%). The Terra types are
    # shared terrain defs, so they reuse Terra's sprites/colors/resources.
    terrain_weights:
      Plains: 0.16
      Forest: 0.12
      Dirt: 0.08
      Rock: 0.08
      Mountain: 0.06
      River: 0.05
      Sand: 0.03
      Snow: 0.02
      Aether_Spring: 0.06
      Crystal_Grove: 0.07
      Marble_Terrace: 0.06
      Starfall_Crater: 0.05
      Ley_Nexus: 0.06
      Arcane_Relay: 0.04
      Cloud_Meadow: 0.04
      Shimmer_Lake: 0.02
    persistence_type: "static"
    spawn_x: 200
    spawn_y: 200
    rank_requirement: 58
    yield_scale: 1.8
    npc_scale: 2.5

  - planet_key: "citadel"
    planet_type: "fortress"
