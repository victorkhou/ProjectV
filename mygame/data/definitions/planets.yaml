# Planet coordinate space definitions for the Procedural Coordinate World system.
# Each entry defines a separate coordinate space with its own dimensions,
# terrain seed, terrain weights, and room persistence type.
# z_level provides a numeric shorthand for teleport (e.g. teleport 50,50,0)
# Phase 1: 6 planets with level-gated progression
#
# rank_requirement is now a LEVEL requirement (1-100).
# Final ladder (2026-07-21): Terra=1, Forge=21, Tundra=33, Inferno=46,
# Elysium=58, Citadel=70, Space=1 (off-ladder hub).
#
# z_level ordering follows the progression ladder: Terra=0, Forge=1, Tundra=2,
# Inferno=3, Elysium=4, Citadel=5, Space=6 (hub last). z_level is only a
# teleport shorthand; runtime planet identity is planet_key, and terrain is
# seed-derived, so renumbering z_level never regenerates maps or moves data.

planets:
  - planet_key: "terra"
    planet_type: "earth"
    z_level: 0
    width: 500
    height: 500
    terrain_seed: 42
    # terrain_noise_cell_size is the biome scale: the coarse-noise cell edge in
    # tiles. Larger = bigger, more coherent contiguous biomes (regions of one
    # terrain) rather than fine per-tile scatter. 14 gives readable biomes at
    # the ~30-tile viewport while still varying across a 400-500 wide map.
    terrain_noise_cell_size: 14
    # Unified terrain template (terrain-strategy): 3 COMMON buildable tiles at
    # ~15% each (~45% total) are the baseline biome that supplies Wood/Stone/
    # Iron; the remaining ~55% is one tile of each archetype — SIGHT, COVER,
    # OPEN, FORTRESS — plus a rare TREACHEROUS hazard tile. Same shape on every
    # planet; only the biome skin, payoff tiles, and unique resource differ.
    # Weights are relative (the generator normalizes the sum).
    terrain_weights:
      Plains: 0.15
      Dirt: 0.15
      Rock: 0.15
      Mountain: 0.12
      Sand: 0.12
      Snow: 0.13
      Forest: 0.1
      River: 0.08
    persistence_type: "static"
    spawn_x: 250
    spawn_y: 250
    default_planet: true
    rank_requirement: 1
    yield_scale: 1.0   # baseline harvest yield (Phase 4 ascending yields)
    npc_scale: 1.0     # baseline NPC-base difficulty

  - planet_key: "forge"
    planet_type: "industrial"
    z_level: 1
    width: 400
    height: 400
    terrain_seed: 7
    terrain_noise_cell_size: 14
    # ~50% neutral basic (Factory_Floor); rest inverse to benefit magnitude.
    terrain_weights:
      Factory_Floor: 0.15
      Warehouse: 0.15
      Pipeline: 0.15
      Circuit_Field: 0.12
      Power_Grid: 0.12
      Ruins: 0.13
      Scrapyard: 0.1
      Toxic_Waste: 0.08
    persistence_type: "static"
    spawn_x: 200
    spawn_y: 200
    rank_requirement: 21
    yield_scale: 1.2
    npc_scale: 1.3

  - planet_key: "tundra"
    planet_type: "frozen"
    z_level: 2
    width: 400
    height: 400
    terrain_seed: 13
    terrain_noise_cell_size: 14
    # ~50% neutral basic (Tundra_Moss); rest inverse to benefit magnitude.
    terrain_weights:
      Tundra_Moss: 0.15
      Permafrost: 0.15
      Snowfield: 0.15
      Glacier: 0.12
      Hot_Spring: 0.12
      Pine_Forest: 0.13
      Ice_Cave: 0.1
      Frozen_Lake: 0.08
    persistence_type: "static"
    spawn_x: 200
    spawn_y: 200
    rank_requirement: 33
    yield_scale: 1.4
    npc_scale: 1.6

  - planet_key: "inferno"
    planet_type: "volcanic"
    z_level: 3
    width: 300
    height: 300
    terrain_seed: 66
    terrain_noise_cell_size: 14
    # ~50% neutral basic (Ash_Wastes); rest inverse to benefit magnitude.
    terrain_weights:
      Ash_Wastes: 0.15
      Scorched_Rock: 0.15
      Obsidian_Plain: 0.15
      Basalt_Ridge: 0.12
      Ember_Field: 0.12
      Sulfur_Pit: 0.13
      Magma_Vent: 0.1
      Lava_Flow: 0.08
    persistence_type: "static"
    spawn_x: 150
    spawn_y: 150
    rank_requirement: 46
    yield_scale: 1.6
    npc_scale: 2.0

  - planet_key: "elysium"
    planet_type: "paradise"
    z_level: 4
    width: 400
    height: 400
    terrain_seed: 117
    terrain_noise_cell_size: 14
    # Elysium is an earth-like paradise: neutral Dirt is the ~50% basic biome
    # (shared Terra def), with Earth terrain + arcane paradise tiles as the
    # benefit-bearing minority, weighted inversely to benefit magnitude like
    # every other planet. Terra/arcane types reuse their shared sprites/yields.
    terrain_weights:
      Plains: 0.15
      Rock: 0.15
      Cloud_Meadow: 0.15
      Mountain: 0.12
      Arcane_Relay: 0.12
      Ley_Nexus: 0.13
      Aether_Spring: 0.1
      Shimmer_Lake: 0.08
    persistence_type: "static"
    spawn_x: 200
    spawn_y: 200
    rank_requirement: 58
    yield_scale: 1.8
    npc_scale: 2.5

  - planet_key: "citadel"
    planet_type: "fortress"
    z_level: 5
    width: 200
    height: 200
    terrain_seed: 88
    terrain_noise_cell_size: 14
    # ~50% neutral basic (Corridor); rest inverse to benefit magnitude.
    terrain_weights:
      Corridor: 0.15
      Barracks_Ruin: 0.15
      Open_Chamber: 0.15
      Control_Room: 0.12
      Generator_Room: 0.12
      Armory_Ruin: 0.13
      Vault_Room: 0.1
      Blast_Door: 0.08
    persistence_type: "static"
    spawn_x: 100
    spawn_y: 100
    rank_requirement: 70
    yield_scale: 2.0
    npc_scale: 3.0

  - planet_key: "space"
    planet_type: "space"
    z_level: 6
    width: 1000
    height: 1000
    terrain_seed: 99
    terrain_noise_cell_size: 14
    # ~50% neutral basic (Void — empty vacuum); rest inverse to benefit.
    terrain_weights:
      Void: 0.15
      Debris: 0.15
      Ice_Field: 0.15
      Nebula: 0.12
      Wormhole: 0.12
      Derelict_Ship: 0.13
      Asteroid: 0.1
      Radiation_Zone: 0.08
    persistence_type: "static"
    spawn_x: 500
    spawn_y: 500
    rank_requirement: 1
    yield_scale: 1.0   # off-ladder hub — no yield bonus
    npc_scale: 1.0
