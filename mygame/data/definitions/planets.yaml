# Planet coordinate space definitions for the Procedural Coordinate World system.
# Each entry defines a separate coordinate space with its own dimensions,
# terrain seed, terrain weights, and room persistence type.
# z_level provides a numeric shorthand for teleport (e.g. teleport 50,50,0)
# Phase 1: 6 planets with level-gated progression
#
# rank_requirement is now a LEVEL requirement (1-60).
# Old rank → level mapping: rank N → level (N-1)*5 + 1
# Terra=1, Forge=21, Tundra=31, Space=31, Inferno=41, Citadel=51

planets:
  - planet_key: "terra"
    planet_type: "earth"
    z_level: 0
    width: 500
    height: 500
    terrain_seed: 42
    terrain_noise_cell_size: 8
    terrain_weights:
      Plains: 0.25
      Forest: 0.20
      Dirt: 0.15
      Rock: 0.15
      Mountain: 0.08
      River: 0.07
      Sand: 0.05
      Snow: 0.05
    persistence_type: "static"
    spawn_x: 250
    spawn_y: 250
    default_planet: true
    rank_requirement: 1

  - planet_key: "forge"
    planet_type: "industrial"
    z_level: 1
    width: 400
    height: 400
    terrain_seed: 7
