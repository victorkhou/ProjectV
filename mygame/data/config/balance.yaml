# Game balance configuration for RTS Combat Overworld

production_scaling:
  1: 10
  2: 50
  3: 150
  4: 400
  5: 1000

turret_damage: 15
turret_radius: 7

xp_kill: 100
xp_building_destroy: 50
xp_damage: 0.1
xp_death_loss: 50

gather_amount: 1
player_default_health: 100

resource_respawn_ticks: 30
combat_lockout_ticks: 5

# Passive HP regeneration for players and agents (NOT buildings — buildings
# must be repaired). hp_regen_percent% of max HP is restored every
# hp_regen_interval_ticks ticks (default: 1% per 2 ticks). Set hp_regen_percent
# to 0 to disable. The rate is scaled per-entity by db.regen_multiplier
# (default 1.0) — the hook heal-rate tech and powerups tune.
hp_regen_percent: 1.0
hp_regen_interval_ticks: 2

# Building repair (the 'repair' command). Buildings do NOT passively heal;
# repairing restores a damaged building to full HP for resources. Cost scales
# with the fraction of HP missing: fully repairing from 0 HP costs
# repair_cost_fraction of the building's full construction cost.
repair_cost_fraction: 0.5

tick_interval: 1.0
chunk_size: 10
save_interval: 30

metrics_enabled: false
metrics_interval: 60

# --- New: Coordinate World config ---
player_vision_radius: 10         # tiles visible around the player character
building_vision_radius: 7        # tiles visible around each owned building
room_cache_max_size: 1000        # max rooms held in the LRU cache
gc_interval_ticks: 100           # how often garbage collection runs
gc_min_age_ticks: 50             # minimum age before a dynamic room is eligible for GC

# --- Agent training (migrated from world.constants) ---
base_training_cost:              # per-resource base cost; agent #N costs base × N
  Wood: 15
  Stone: 10
  Iron: 5
base_training_ticks: 300         # base training time (5 min at 1 tick/s)
academy_training_reduction_per_level: 0.15   # training time cut per Academy level

# --- Resource harvesting & production (migrated) ---
harvest_cooldown_ticks: 4        # ticks between harvest yields (active-presence)
harvest_yield_per_action: 1      # units per harvest action on raw terrain
extractor_harvest_multiplier: 3  # yield multiplier at an Extractor vs raw terrain
extractor_level_bonus: 0.25      # per-level Extractor production bonus
extractor_base_capacity: 100     # Extractor storage at level 1
extractor_capacity_per_level: 50 # extra Extractor storage per level above 1
vault_base_capacity: 100         # Vault storage at level 1
vault_capacity_per_level: 20     # extra Vault storage per level above 1

# --- Building scaling (migrated) ---
upgrade_cost_base: 2             # upgrade cost = base_cost × COST_BASE^(level-1)
upgrade_time_base: 3             # upgrade time = build_time × TIME_BASE^(level-1)
turret_level_bonus: 0.20         # per-level Turret damage bonus
demolish_refund_default: 0.40    # refund rate for levels not in the table below
demolish_refund_rates:           # refund fraction of invested cost by level
  1: 0.40
  2: 0.50
  3: 0.60
  4: 0.70
  5: 0.80

# --- Carry-weight tuning (equipment/items feature, D7) ---
# Per-unit carried weight for each resource (title-case keys, values >= 0).
# Resources are deliberately light; a resource omitted here defaults to
# DEFAULT_RESOURCE_WEIGHT. With BASE_CARRY_WEIGHT = 1000 a player can haul
# "a lot, but not infinite" (e.g. ~2000 Wood or ~500 Nexium).
resource_weights:
  Wood: 0.5
  Stone: 1.0
  Iron: 1.0
  Energy: 0.2
  Circuits: 0.3
  Nexium: 2.0

# --- Equipment production (equipment/items feature) ---
# An equipment building (Armorer/Lab/Medbay) yields at most one item every
# this many ticks (mirrors harvest_cooldown_ticks), and stalls once an owner
# already holds this many un-equipped produced items (0 disables the cap).
equipment_production_ticks: 30
equipment_production_owner_cap: 50

# --- Guard combat AI (PvE NPC bases feature, Phase 3) ---
# Guards (role "guard"/"soldier") whose owner has an active HQ attack the
# nearest non-owner player within guard_aggro_radius each tick, using a
# synthetic weapon routed through the standard combat formula. Outpost guards
# are melee (range 1); fortress soldiers are ranged (guard_ranged_range).
guard_melee_damage: 10           # base damage for melee guards (outpost)
guard_ranged_damage: 15          # base damage for ranged guards (fortress)
guard_ranged_range: 4            # weapon range (tiles) for ranged guards
guard_aggro_radius: 5            # detection distance (tiles) for guard AI

# --- Ranged targeting: lock-on ('target') + shooting ('shoot') ---
# 'target <enemy>' locks on over target_lock_ticks (reduced by a weapon's
# lock_speed stat). A locked shot hits at accuracy_targeted; an unlocked
# directional 'shoot <dir>' hits at accuracy_directional. Both baselines are
# raised by the weapon's 'accuracy' stat modifier and clamped to [0, 1].
target_lock_ticks: 3             # ticks to fully lock onto a target
accuracy_targeted: 0.9           # hit chance vs a locked target (baseline)
accuracy_directional: 0.7        # hit chance for a directional shot (baseline)

# --- Hybrid real-time combat ---
# A player's own 'attack' (direct) and directional 'shoot' resolve INSTANTLY
# (not queued to the tick); this wall-clock cooldown (seconds) throttles them
# in place of the 1-second tick. A weapon may override via an 'attack_cooldown'
# stat modifier. Turrets/guards/locked-tracking shots stay tick-queued.
attack_cooldown_seconds: 1.0     # seconds between a player's instant attacks

# --- Player lifecycle: linkdead grace ---
# When a PLAYING player drops their connection without 'quit', their character
# stays a live combat target for this many wall-clock seconds before being
# removed to the lobby (anti-combat-log). Keep >= combat lockout. Only used when
# the lobby lifecycle flow is enabled.
linkdead_grace_seconds: 30.0

# --- NPC base spawner + elimination (PvE NPC bases, Phase 5) ---
# NPC outposts/fortresses placed on the map at init; destroying a base's HQ
# wipes the whole base and awards xp_hq_destroy + loot, then respawns it
# elsewhere after outpost_respawn_ticks. Loot tables live in outposts.yaml.
xp_hq_destroy: 500               # XP for destroying an NPC HQ (whole base wiped)
outpost_respawn_ticks: 600       # ticks before a cleared base respawns (0=never)
outpost_count: 5                 # outposts per planet at init
fortress_count: 2                # fortresses per planet at init
outpost_guard_hp: 80             # HP per outpost guard
fortress_guard_hp: 150           # HP per fortress guard

# --- Tile (room) item-capacity caps ---
# Max loose ground items (dropped Game_Items + Resource_Drops) a single tile
# can hold before generation and manual drops are refused. A tile's cap depends
# on the building sitting on it:
#   * no building        -> room_capacity_empty
#   * Vault / Extractor   -> room_capacity_per_storage_level x building level
#   * any other building  -> room_capacity_building
# Merging into an existing same-type drop does not add an object, so it is
# always allowed; only creating a NEW drop object counts against the cap.
room_capacity_empty: 1              # bare tile holds a single dropped item
room_capacity_building: 10          # tile with a non-storage/resource building
room_capacity_per_storage_level: 20 # x level for Vault (storage) & Extractor
